[supervisord]
nodaemon=true
user=root
logfile=/tmp/logs/supervisord.log
childlogdir=/tmp/logs
pidfile=/tmp/supervisord.pid

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
stdout_logfile=/tmp/logs/cron.log
stderr_logfile=/tmp/logs/cron.log
user=root

[program:streamlit]
command=streamlit run src/whatsapp_manager/ui/main_app.py --server.port=8501 --server.address=0.0.0.0
directory=/app
autostart=true
autorestart=true
stdout_logfile=/tmp/logs/streamlit.log
stderr_logfile=/tmp/logs/streamlit.log
user=appuser
environment=HOME="/home/appuser",USER="appuser"
